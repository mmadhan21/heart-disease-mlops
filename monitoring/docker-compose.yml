# =============================================================
# Heart Disease MLOps Pipeline
# File    : monitoring/docker-compose.yml
# Purpose : Spin up Prometheus (metrics scraping) and Grafana
#           (metrics dashboard) as Docker containers.
#
# Start   : cd monitoring && docker-compose up -d
# Stop    : docker-compose down
# URLs    :
#   Prometheus → http://localhost:9090
#   Grafana    → http://localhost:3000  (admin / admin)
# =============================================================

version: "3.8"

services:

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Mount our custom scrape config into the container
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - monitoring

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

# ── Shared network ────────────────────────────────────────
networks:
  monitoring:
    driver: bridge

# ── Named volume for Grafana data persistence ─────────────
volumes:
  grafana_data: