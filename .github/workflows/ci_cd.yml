name: Heart Disease MLOps CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ──────────────────────────────────────
  # JOB 1 - LINT
  # ──────────────────────────────────────
  lint:
    name: "1 - Code Linting (flake8)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install flake8
        run: pip install flake8==6.1.0

      - name: Run flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402,E221,E241,E251,E272,E203,E211,E231,E202,E702,W291,W293,W292,F401,F841,F541 \
            --count \
            --statistics

  # ──────────────────────────────────────
  # JOB 2 - UNIT TESTS
  # ──────────────────────────────────────
  test:
    name: "2 - Unit Tests (pytest)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: python data/download_data.py

      - name: Run unit tests
        run: |
          pytest tests/test_preprocess.py \
            -v \
            --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/

  # ──────────────────────────────────────
  # JOB 3 - MODEL TRAINING
  # ──────────────────────────────────────
  train:
    name: "3 - Model Training (MLflow)"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: python data/download_data.py

      - name: Train models
        run: |
          export GIT_PYTHON_REFRESH=quiet
          python src/train.py

      - name: Verify model created
        run: |
          if [ ! -f models/best_model.pkl ]; then
            echo "ERROR: model not created!"
            exit 1
          fi
          echo "Model created successfully!"
          ls -lh models/

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 7

      - name: Upload MLflow logs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 7

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: training-plots
          path: screenshots/
          retention-days: 7

  # ──────────────────────────────────────
  # JOB 4 - DOCKER BUILD AND TEST
  # ──────────────────────────────────────
  docker:
    name: "4 - Docker Build and Smoke Test"
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Build Docker image
        run: |
          docker build \
            --tag heart-disease-api:ci \
            .

      - name: Start container
        run: |
          docker run -d \
            --name heart-api-ci \
            -p 8000:8000 \
            heart-disease-api:ci
          echo "Waiting for startup..."
          sleep 30

      - name: Test health endpoint
        run: |
          response=$(curl -s -o /dev/null \
            -w "%{http_code}" \
            http://localhost:8000/health)
          echo "HTTP Status: $response"
          if [ "$response" != "200" ]; then
            echo "Health check failed!"
            docker logs heart-api-ci
            exit 1
          fi
          echo "Health check passed!"

      - name: Test predict endpoint
        run: |
          result=$(curl -s \
            -X POST \
            http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":3,
                 "trestbps":145,"chol":233,
                 "fbs":1,"restecg":0,
                 "thalach":150,"exang":0,
                 "oldpeak":2.3,"slope":0,
                 "ca":0,"thal":1}')
          echo "Response: $result"
          if echo "$result" | grep -q "prediction"; then
            echo "Predict test passed!"
          else
            echo "Predict test failed!"
            docker logs heart-api-ci
            exit 1
          fi

      - name: Print container logs
        if: always()
        run: docker logs heart-api-ci

      - name: Cleanup
        if: always()
        run: |
          docker stop heart-api-ci || true
          docker rm   heart-api-ci || true
